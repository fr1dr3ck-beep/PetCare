name: Deploy Flutter Web App to GitHub Pages

on:
  push:
    branches:
      - master # Triggers automatically when your master branch updates

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Java SDK Environment
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Compile Production Web Assets
        run: |
          flutter pub get
          flutter build web --release --base-href "/PetCare/"

      - name: Stream Static Assets to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web # Points directly to your compiled web build target
          branch: gh-pages # Automatically deploys to a separate hosting branch